version: '3.8'

services:
  cv.kabilan108.com:
    build:
      context: cv.kabilan108.com/
      dockerfile: Dockerfile
      target: release
    ports:
      - 3000:3000
    environment:
      - NODE_ENV=production
    volumes:
      - ./cv.kabilan108.com:/usr/src/app
    restart: unless-stopped
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role==worker
