repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=20480"]
  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: npx biome check .
        language: system
        types: [javascript, jsx, tsx, json]
